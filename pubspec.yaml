name: vaultchat
description: VaultChat private decentralized encrypted messenger.
publish_to: "none"

version: 0.9.7+19

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  dart_nostr: ^10.0.1
  nip04: ^0.2.0
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  crypto: ^3.0.6
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4
  cryptography: ^2.7.0
  pointycastle: ^3.9.1

  # ── Encrypted attachments ───────────────────────────────────────────────
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  http: ^1.2.2
  open_filex: ^4.3.4
  path_provider: ^2.1.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
